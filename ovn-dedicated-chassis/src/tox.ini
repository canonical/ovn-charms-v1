[tox]
envlist = pep8
sitepackages = False
skip_missing_interpreters = False

[testenv]
skip_install = True
setenv = VIRTUAL_ENV={envdir}
         PYTHONHASHSEED=0
         TEST_JUJU3=true
         ZAZA_FEATURE_BUG472=1
allowlist_externals = juju
passenv =
    HOME
    TERM
    CS_*
    OS_*
    TEST_*
    ZAZA_*
deps = -r{toxinidir}/test-requirements.txt

[testenv:pep8]
basepython = python3
commands = charm-proof

[testenv:func-noop]
basepython = python3
commands =
    functest-run-suite --help

[testenv:func]
basepython = python3
commands =
    functest-run-suite --keep-model

[testenv:func-smoke]
basepython = python3
commands =
    functest-run-suite --keep-model --smoke

[testenv:func-target]
basepython = python3
commands =
    functest-run-suite --keep-model --bundle {posargs}

[testenv:venv]
commands = {posargs}