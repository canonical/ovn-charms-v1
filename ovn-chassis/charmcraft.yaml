type: charm

parts:
  charm:
    source: src/
    plugin: reactive
    reactive-charm-build-arguments:
    - --binary-wheels-from-source
    - -v
    build-packages:
    - git
    - python3-dev
    - libffi-dev
    - libssl-dev
    - rustc-1.91
    - cargo-1.91
    - pkg-config
    override-build: |
      # Note(mylesjp): Force build to use rustc-1.91
      ln -sf /usr/bin/rustc-1.91 /usr/bin/rustc
      ln -sf /usr/bin/cargo-1.91 /usr/bin/cargo
      craftctl default
    build-snaps:
    - charm/latest/edge
    build-environment:
    - CHARM_INTERFACES_DIR: $CRAFT_PROJECT_DIR/interfaces/
    - CHARM_LAYERS_DIR: $CRAFT_PROJECT_DIR/layers/
    - MAKEFLAGS: -j$(nproc)
    - CARGO_HTTP_MULTIPLEXING: 'false'
    - MATURIN_NO_INSTALL_RUST: "1"

platforms:
  ubuntu@24.04:amd64:
  ubuntu@24.04:arm64:
  ubuntu@24.04:ppc64el:
  ubuntu@24.04:s390x:
  ubuntu@22.04:amd64:
  ubuntu@22.04:arm64:
  ubuntu@22.04:ppc64el:
  ubuntu@22.04:s390x:
