variables:
  openstack-origin: &openstack-origin distro

local_overlay_enabled: False

series: jammy

applications:

  vault:
    charm: ch:vault
    num_units: 1
    channel: latest/edge

  ovn-central:
    charm: ch:ovn-central
    num_units: 3
    options:
      source: *openstack-origin
    channel: 22.03/stable

  magpie:
    # The large memory allocation for this application is for the purpose of DPDK
    # tests that use hugepages
    constraints: "virt-type=virtual-machine mem=8G"
    charm: ch:magpie
    num_units: 2
    channel: legacy/stable

  ovn-chassis:
    charm: ../../../ovn-chassis_ubuntu-22.04-amd64.charm

relations:

  - - 'ovn-central:certificates'
    - 'vault:certificates'

  - - 'magpie:juju-info'
    - 'ovn-chassis:juju-info'

  - - 'ovn-chassis:ovsdb'
    - 'ovn-central:ovsdb'

  - - 'ovn-chassis:certificates'
    - 'vault:certificates'
