[tox]
envlist = {pep8,py3}-{central,chassis,dedicated_chassis}
sitepackages = False
skip_missing_interpreters = False

[testenv]
skip_install = True
setenv = VIRTUAL_ENV={envdir}
         PYTHONHASHSEED=0
         TERM=linux
         CHARM_LAYERS_DIR={toxinidir}/layers
         CHARM_INTERFACES_DIR={toxinidir}/interfaces
         JUJU_REPOSITORY={toxinidir}/build
         cover: PYTHON=coverage run
         cover: COVERAGE_RCFILE={toxinidir}/tox.ini
         VIRTUALENV_DOWNLOAD = True
passenv =
    no_proxy
    http_proxy
    https_proxy
    CHARM_INTERFACES_DIR
    CHARM_LAYERS_DIR
    JUJU_REPOSITORY
allowlist_externals =
    charmcraft
    bash
    tox

changedir =
    central: {toxinidir}/ovn-central
    chassis: {toxinidir}/ovn-chassis
    dedicated_chassis: {toxinidir}/ovn-dedicated-chassis

deps =
    pep8: flake8==7.1.1
    py3: -r{toxinidir}/test-requirements.txt
    cover: -r{toxinidir}/test-requirements.txt

commands =
    pep8: flake8 {posargs} src unit_tests
    py3: stestr run --slowest {posargs}
    cover: coverage erase
    cover: stestr run --slowest {posargs}
    cover: coverage combine
    cover: coverage html -d cover
    cover: coverage xml -o cover/coverage.xml
    cover: coverage report

[coverage:run]
branch = True
concurrency = multiprocessing
parallel = True
source =
    .
omit =
    .tox/*
    */charmhelpers/*
    unit_tests/*

[testenv:func-target-{central,chassis,dedicated_chassis}]
basepython = python3
changedir =
    central: {toxinidir}/ovn-central/src
    chassis: {toxinidir}/ovn-chassis/src
    dedicated_chassis: {toxinidir}/ovn-dedicated-chassis/src
setenv =
    VIRTUAL_ENV={envdir}
    PYTHONHASHSEED=0
    TEST_JUJU3=true
    ZAZA_FEATURE_BUG472=1
    OVN_CHARMS_REF={env:OVN_CHARMS_REF:main}
    # zaza and zaza-openstack-tests are built from the git subtrees
    # under tests/lib via pip's subdirectory feature.  Their setup.py
    # uses ``use_scm_version=True``, so setuptools_scm tries to derive
    # a version from git tags.  The zaza upstream version tags are not
    # carried in this monorepo's history (they live in the upstream
    # zaza/zaza-openstack-tests repositories), so inference fails with
    # ``LookupError: setuptools-scm was unable to detect version``.
    # Pretend a fixed version to bypass git tag lookup.  The value is
    # overridable via the environment for advanced use cases.
    SETUPTOOLS_SCM_PRETEND_VERSION_FOR_ZAZA={env:SETUPTOOLS_SCM_PRETEND_VERSION_FOR_ZAZA:0.0.1.dev1}
    SETUPTOOLS_SCM_PRETEND_VERSION_FOR_ZAZA_OPENSTACK={env:SETUPTOOLS_SCM_PRETEND_VERSION_FOR_ZAZA_OPENSTACK:0.0.1.dev1}
passenv =
    HOME
    TERM
    CS_*
    OS_*
    TEST_*
    ZAZA_*
allowlist_externals = juju
deps =
    -c {env:TEST_CONSTRAINTS_FILE:https://raw.githubusercontent.com/canonical/ovn-charms-v1/{env:OVN_CHARMS_REF}/tests/lib/zaza-openstack-tests/constraints/constraints-noble.txt}
    -r{toxinidir}/func-test-requirements.txt
commands =
    functest-run-suite --keep-model --bundle {posargs}

[flake8]
# E402 ignore necessary for path append before sys module import in actions
ignore = E402,W503,W504