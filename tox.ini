[tox]
envlist = {pep8,py3}-{central,chassis,dedicated_chassis}
sitepackages = False
skip_missing_interpreters = False

[testenv]
skip_install = True
setenv = VIRTUAL_ENV={envdir}
         PYTHONHASHSEED=0
         TERM=linux
         CHARM_LAYERS_DIR={toxinidir}/layers
         CHARM_INTERFACES_DIR={toxinidir}/interfaces
         JUJU_REPOSITORY={toxinidir}/build
         cover: PYTHON=coverage run
         cover: COVERAGE_RCFILE={toxinidir}/tox.ini
passenv =
    no_proxy
    http_proxy
    https_proxy
    CHARM_INTERFACES_DIR
    CHARM_LAYERS_DIR
    JUJU_REPOSITORY
allowlist_externals =
    charmcraft
    bash
    tox

changedir =
    central: {toxinidir}/ovn-central
    chassis: {toxinidir}/ovn-chassis
    dedicated_chassis: {toxinidir}/ovn-dedicated-chassis

deps =
    pep8: flake8==7.1.1
    py3: -r{toxinidir}/test-requirements.txt
    cover: -r{toxinidir}/test-requirements.txt

commands =
    pep8: flake8 {posargs} src unit_tests
    py3: stestr run --slowest {posargs}
    cover: coverage erase
    cover: stestr run --slowest {posargs}
    cover: coverage combine
    cover: coverage html -d cover
    cover: coverage xml -o cover/coverage.xml
    cover: coverage report

[coverage:run]
branch = True
concurrency = multiprocessing
parallel = True
source =
    .
omit =
    .tox/*
    */charmhelpers/*
    unit_tests/*

[flake8]
# E402 ignore necessary for path append before sys module import in actions
ignore = E402,W503,W504
