type: charm

parts:
  charm:
    source: src/
    plugin: reactive
    reactive-charm-build-arguments:
      - --binary-wheels-from-source
      - -v
    build-packages:
    - git
    - python3-dev
    - libffi-dev
    - libssl-dev
    - rustc-1.91
    - cargo-1.91
    - pkg-config
    override-build: |
      # Note(mylesjp): Force build to use rustc-1.91
      ln -sf /usr/bin/rustc-1.91 /usr/bin/rustc
      ln -sf /usr/bin/cargo-1.91 /usr/bin/cargo
      craftctl default
    build-snaps:
      - charm
    build-environment:
    - CHARM_INTERFACES_DIR: /root/project/interfaces/
    - CHARM_LAYERS_DIR: /root/project/layers/
    - MAKEFLAGS: -j$(nproc)
    - MATURIN_NO_INSTALL_RUST: "1"
bases:
  - build-on:
      - name: ubuntu
        channel: "22.04"
        architectures: [amd64]
    run-on:
      - name: ubuntu
        channel: "22.04"
        architectures: [amd64]
  - build-on:
      - name: ubuntu
        channel: "22.04"
        architectures: [s390x]
    run-on:
      - name: ubuntu
        channel: "22.04"
        architectures: [s390x]
  - build-on:
      - name: ubuntu
        channel: "22.04"
        architectures: [ppc64el]
    run-on:
      - name: ubuntu
        channel: "22.04"
        architectures: [ppc64el]
  - build-on:
      - name: ubuntu
        channel: "22.04"
        architectures: [arm64]
    run-on:
      - name: ubuntu
        channel: "22.04"
        architectures: [arm64]
  - build-on:
      - name: ubuntu
        channel: "23.10"
        architectures: [amd64]
    run-on:
      - name: ubuntu
        channel: "23.10"
        architectures: [amd64]
  - build-on:
      - name: ubuntu
        channel: "23.10"
        architectures: [s390x]
    run-on:
      - name: ubuntu
        channel: "23.10"
        architectures: [s390x]
  - build-on:
      - name: ubuntu
        channel: "23.10"
        architectures: [ppc64el]
    run-on:
      - name: ubuntu
        channel: "23.10"
        architectures: [ppc64el]
  - build-on:
      - name: ubuntu
        channel: "23.10"
        architectures: [arm64]
    run-on:
      - name: ubuntu
        channel: "23.10"
        architectures: [arm64]
