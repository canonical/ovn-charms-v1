type: charm

parts:
  charm:
    source: src/
    plugin: reactive
    reactive-charm-build-arguments:
      - --binary-wheels-from-source
      - --upgrade-buildvenv-core-deps
      - -v
    build-packages:
      - git
      - python3-dev
      - libffi-dev
      - libssl-dev
      - rustc-1.91
      - cargo-1.91
      - pkg-config
    override-build: |
      ln -sf /usr/bin/rustc-1.91 /usr/bin/rustc
      ln -sf /usr/bin/cargo-1.91 /usr/bin/cargo
      craftctl default
    build-snaps:
      - charm
    build-environment:
      - CHARM_INTERFACES_DIR: /root/project/interfaces/
      - CHARM_LAYERS_DIR: /root/project/layers/
      - MAKEFLAGS: -j$(nproc)
      - MATURIN_NO_INSTALL_RUST: "1"

platforms:
  ubuntu@22.04:amd64:
  ubuntu@22.04:s390x:
  ubuntu@22.04:ppc64el:
  ubuntu@22.04:arm64: